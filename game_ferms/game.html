<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ферма-Кликер для ВК</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #1a1a1a;
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .game-area {
            background: #2e7d32;
            border-radius: 24px;
            padding: 24px 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 0 #0d3b0e;
        }
        h1 {
            font-size: 26px;
            text-align: center;
            margin-bottom: 16px;
            text-shadow: 2px 2px 0 #0d3b0e;
        }
        .stats {
            background: #388e3c;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 -4px 0 #1b5e20;
        }
        .coins {
            font-size: 28px;
            font-weight: bold;
        }
        .income {
            font-size: 16px;
            opacity: 0.9;
        }
        .click-btn {
            background: #fdd835;
            border: none;
            color: #1b5e20;
            font-size: 28px;
            font-weight: bold;
            padding: 18px;
            border-radius: 60px;
            width: 100%;
            box-shadow: 0 6px 0 #f9a825;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
            margin-bottom: 20px;
        }
        .click-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #f9a825;
        }
        .upgrades {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .upgrade-item {
            background: #388e3c;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 -3px 0 #1b5e20;
        }
        .upgrade-info {
            display: flex;
            flex-direction: column;
        }
        .upgrade-name {
            font-weight: bold;
            font-size: 16px;
        }
        .upgrade-desc {
            font-size: 13px;
            opacity: 0.8;
        }
        .buy-btn {
            background: #ffb300;
            border: none;
            color: #1b5e20;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 15px;
            box-shadow: 0 3px 0 #f57f17;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.05s linear;
            min-width: 90px;
            text-align: center;
        }
        .buy-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #f57f17;
        }
        .buy-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 3px 0 #f57f17;
            pointer-events: none;
        }
        .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="game-area">
        <h1>🐄 Ферма-Кликер</h1>
        <div class="stats">
            <span class="coins" id="coinDisplay">0</span>
            <span class="income" id="incomeDisplay">+0.0/сек</span>
        </div>
        <button class="click-btn" id="clickBtn">🌾 Кликни!</button>
        <div class="upgrades">
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="upgrade-name">🐄 Корова</span>
                    <span class="upgrade-desc">+1 монета/сек</span>
                </div>
                <button class="buy-btn" data-upgrade="cow">Купить (10)</button>
            </div>
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="upgrade-name">🚜 Трактор</span>
                    <span class="upgrade-desc">+5 монет/сек</span>
                </div>
                <button class="buy-btn" data-upgrade="tractor">Купить (50)</button>
            </div>
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="upgrade-name">🌱 Удобрение</span>
                    <span class="upgrade-desc">+1 к клику</span>
                </div>
                <button class="buy-btn" data-upgrade="fertilizer">Купить (30)</button>
            </div>
        </div>
        <div class="footer">Ваш прогресс сохраняется автоматически</div>
    </div>

    <script>
        // --- ИГРОВАЯ ЛОГИКА ---
        let state = {
            coins: 0,
            income: 0,
            clickPower: 1,
            upgrades: { cow: 0, tractor: 0, fertilizer: 0 }
        };

        const UPGRADE_PRICES = { cow: 10, tractor: 50, fertilizer: 30 };
        const UPGRADE_MULTIPLIERS = { cow: 1.5, tractor: 1.7, fertilizer: 2.0 };

        const coinDisplay = document.getElementById('coinDisplay');
        const incomeDisplay = document.getElementById('incomeDisplay');
        const clickBtn = document.getElementById('clickBtn');

        // --- ФУНКЦИИ ОБНОВЛЕНИЯ ИНТЕРФЕЙСА ---
        function updateUI() {
            coinDisplay.textContent = Math.floor(state.coins);
            incomeDisplay.textContent = `+${state.income.toFixed(1)}/сек`;

            document.querySelectorAll('.buy-btn').forEach(btn => {
                const type = btn.dataset.upgrade;
                const count = state.upgrades[type];
                const price = Math.floor(UPGRADE_PRICES[type] * Math.pow(UPGRADE_MULTIPLIERS[type], count));
                btn.textContent = `Купить (${price})`;
                btn.disabled = (state.coins < price);
            });
        }

        // --- СОХРАНЕНИЕ И ЗАГРУЗКА ---
        function saveGame() {
            try {
                localStorage.setItem('farmClickerSave', JSON.stringify(state));
            } catch (e) { /* ignore */ }
        }

        function loadGame() {
            try {
                const saved = localStorage.getItem('farmClickerSave');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    // Безопасное слияние с текущим состоянием на случай добавления новых полей
                    state = { ...state, ...parsed };
                    // Убедимся, что объект upgrades существует и содержит все ключи
                    if (!state.upgrades) state.upgrades = { cow: 0, tractor: 0, fertilizer: 0 };
                    for (let key of ['cow', 'tractor', 'fertilizer']) {
                        if (state.upgrades[key] === undefined) state.upgrades[key] = 0;
                    }
                }
            } catch (e) { /* ignore */ }
            updateUI();
        }

        // --- ПОКУПКА УЛУЧШЕНИЙ ---
        function buyUpgrade(type) {
            const count = state.upgrades[type];
            const price = Math.floor(UPGRADE_PRICES[type] * Math.pow(UPGRADE_MULTIPLIERS[type], count));
            if (state.coins < price) return;

            state.coins -= price;
            state.upgrades[type] += 1;

            switch (type) {
                case 'cow': state.income += 1; break;
                case 'tractor': state.income += 5; break;
                case 'fertilizer': state.clickPower += 1; break;
            }

            updateUI();
            saveGame();
        }

        // --- ОБРАБОТЧИКИ СОБЫТИЙ ---
        clickBtn.addEventListener('click', () => {
            state.coins += state.clickPower;
            updateUI();
            saveGame();
        });

        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                buyUpgrade(btn.dataset.upgrade);
            });
        });

        // --- ПАССИВНЫЙ ДОХОД ---
        setInterval(() => {
            state.coins += state.income / 10;
            updateUI();
            // Сохраняемся реже, чтобы не нагружать хранилище
        }, 100);

        // --- ЗАПУСК ИГРЫ ---
        loadGame();
        // Сохраняемся перед закрытием страницы
        window.addEventListener('beforeunload', saveGame);
    </script>
</body>
</html>
