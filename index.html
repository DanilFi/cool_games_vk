<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Игровой Лаунчер</title>
    <!-- Подключаем Bridge SDK от VK для работы с рекламой и лидербордами -->
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; }
        #launcher-menu { padding: 20px; display: flex; gap: 20px; }
        .game-card { border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: center; }
        .game-card button { background: #4c75a3; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        #game-container { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: black; }
        #game-frame { width: 100%; height: 100%; border: none; }
        #back-button { position: absolute; top: 10px; left: 10px; z-index: 10; background: red; color: white; border: none; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Меню со списком игр -->
    <div id="launcher-menu">
        <h2>Загрузка игрового центра...</h2>
    </div>

    <!-- Контейнер, куда будет разворачиваться выбранная игра -->
    <div id="game-container">
        <button id="back-button" onclick="closeGame()">◀ Выйти в меню</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        // Инициализируем VK Bridge при старте
        vkBridge.send('VKWebAppInit');

        async function initLauncher() {
            try {
                // Качаем актуальный список игр с вашего GitHub
                const response = await fetch('games.json');
                const games = await response.json();
                
                const menu = document.getElementById('launcher-menu');
                menu.innerHTML = ''; // Очищаем текст загрузки

                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <h3>${game.title}</h3>
                        <button onclick="launchGame('${game.url}')">Запустить</button>
                    `;
                    menu.appendChild(card);
                });
            } catch (e) {
                console.error("Ошибка обновления списка игр:", e);
            }
        }

        function launchGame(url) {
            document.getElementById('launcher-menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('game-frame').src = url;
        }

        function closeGame() {
            document.getElementById('game-frame').src = '';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('launcher-menu').style.display = 'flex';
        }

        window.onload = initLauncher;
    </script>
</body>
</html>
