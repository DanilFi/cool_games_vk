<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мой Игровой Лаунчер</title>
    <!-- ✅ 1. ПРАВИЛЬНОЕ ПОДКЛЮЧЕНИЕ VK BRIDGE -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; }
        #launcher-menu { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #games-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .game-card { border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: center; width: 150px; }
        .game-card button { background: #4c75a3; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        #game-container { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: black; }
        #game-frame { width: 100%; height: 100%; border: none; }
        #back-button { position: absolute; top: 10px; left: 10px; z-index: 10; background: red; color: white; border: none; padding: 8px; cursor: pointer; }
        #loading-status { margin-top: 20px; color: #aaa; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>

    <div id="launcher-menu">
        <h2>Игровой центр</h2>
        <div id="games-grid">
            <!-- Сюда будут подгружаться карточки игр -->
            <p id="loading-status">Загрузка списка игр...</p>
        </div>
    </div>

    <div id="game-container">
        <button id="back-button" onclick="closeGame()">◀ Выйти в меню</button>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        // ✅ 2. ПРАВИЛЬНАЯ ИНИЦИАЛИЗАЦИЯ С ОЖИДАНИЕМ ОТВЕТА
        async function initApp() {
            try {
                // Отправляем событие инициализации и ЖДЕМ ответ
                const initData = await vkBridge.send('VKWebAppInit');
                console.log('VK Bridge инициализирован:', initData);
                
                // После успешной инициализации загружаем игры
                await loadGames();
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                showError('Не удалось инициализировать приложение. Попробуйте позже.');
            }
        }

        async function loadGames() {
            const grid = document.getElementById('games-grid');
            const statusEl = document.getElementById('loading-status');

            try {
                // ✅ 3. ЗАГРУЗКА СПИСКА ИГР С ОБРАБОТКОЙ ОШИБОК
                const response = await fetch('games.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const games = await response.json();
                
                // Очищаем статус загрузки
                grid.innerHTML = '';

                if (!games || games.length === 0) {
                    grid.innerHTML = '<p>Список игр пуст.</p>';
                    return;
                }

                // Отображаем карточки игр
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <h3>${game.title}</h3>
                        <button onclick="launchGame('${game.url}')">Запустить</button>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Ошибка загрузки игр:', error);
                showError('Не удалось загрузить список игр. Проверьте соединение или наличие файла games.json.');
            }
        }

        function showError(message) {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = `<p class="error">⚠️ ${message}</p>`;
        }

        // Функции запуска и закрытия игры
        function launchGame(url) {
            document.getElementById('launcher-menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('game-frame').src = url;
        }

        function closeGame() {
            document.getElementById('game-frame').src = '';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('launcher-menu').style.display = 'flex';
        }

        // ✅ 4. ЗАПУСК ПРИЛОЖЕНИЯ ПОСЛЕ ЗАГРУЗКИ СТРАНИЦЫ
        window.onload = initApp;
    </script>
</body>
</html>
