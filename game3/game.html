<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Лесоруб</title>
    <style>
        /* Полностью идентичные стили, как в первом файле */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background: #0a1a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
            margin: 0;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            max-height: 860px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #1a3a1a 0%, #0d260d 100%);
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            border-radius: 0;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px 8px 18px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            border-bottom: 2px solid rgba(255, 215, 0, 0.15);
            flex-shrink: 0;
            min-height: 60px;
        }
        #title {
            color: #ffd700;
            font-size: 22px;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            letter-spacing: 1px;
        }
        #title span {
            font-size: 18px;
        }
        #wood-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        #wood-icon {
            font-size: 22px;
        }
        #wood-count {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            min-width: 50px;
            text-align: center;
            transition: transform 0.1s;
        }
        #wood-count.pop {
            transform: scale(1.25);
            color: #ffd700;
        }
        #tree-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
            padding: 8px;
        }
        #tree-canvas {
            width: 100%;
            height: 100%;
            max-width: 400px;
            max-height: 400px;
            touch-action: none;
            cursor: pointer;
            border-radius: 20px;
            background: radial-gradient(ellipse at bottom, #1e4a1e 0%, #0d260d 100%);
            box-shadow: inset 0 0 80px rgba(0, 30, 0, 0.4);
            transition: transform 0.08s;
        }
        #tree-canvas:active {
            transform: scale(0.97);
        }
        #health-bar-wrap {
            width: 80%;
            max-width: 300px;
            height: 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #f1c40f, #2ecc71);
            border-radius: 20px;
            transition: width 0.15s ease;
        }
        #stats-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            padding: 6px 0 2px 0;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #stats-row span {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 12px;
            border-radius: 12px;
        }
        #stats-row .val {
            color: #fff;
            font-weight: 600;
        }
        #upgrades {
            padding: 8px 12px 14px 12px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255, 215, 0, 0.08);
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-height: 220px;
            overflow-y: auto;
        }
        .upgrade-btn {
            background: rgba(30, 50, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 8px 14px;
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 80px;
            flex: 1 0 calc(50% - 8px);
            max-width: calc(50% - 8px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .upgrade-btn:active {
            transform: scale(0.94);
        }
        .upgrade-btn .name {
            font-weight: 600;
            font-size: 13px;
            color: #fff;
        }
        .upgrade-btn .desc {
            font-size: 11px;
            opacity: 0.7;
            text-align: center;
        }
        .upgrade-btn .cost {
            font-size: 12px;
            color: #ffd700;
            margin-top: 2px;
        }
        .upgrade-btn .owned {
            font-size: 10px;
            color: #5a8;
            background: rgba(0, 0, 0, 0.3);
            padding: 0 8px;
            border-radius: 8px;
        }
        .upgrade-btn.disabled {
            opacity: 0.4;
            filter: grayscale(0.6);
            pointer-events: none;
        }
        .upgrade-btn.bought {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }
        .upgrade-btn .emoji {
            font-size: 20px;
        }
        @media (max-width: 420px) {
            #title { font-size: 17px; }
            #wood-count { font-size: 18px; min-width: 40px; }
            #wood-icon { font-size: 18px; }
            #header { padding: 8px 12px 6px 12px; min-height: 50px; }
            .upgrade-btn { padding: 6px 10px; font-size: 12px; min-width: 60px; flex: 1 0 calc(50% - 6px); max-width: calc(50% - 6px); }
            .upgrade-btn .name { font-size: 12px; }
            #stats-row { font-size: 11px; gap: 8px; }
            #health-bar-wrap { height: 8px; margin-top: 6px; }
            #upgrades { padding: 6px 8px 10px 8px; gap: 6px; max-height: 180px; }
        }
        @media (max-height: 700px) {
            #tree-canvas { max-height: 260px; }
            #header { min-height: 44px; padding: 6px 12px 4px 12px; }
            #title { font-size: 16px; }
            #wood-count { font-size: 16px; }
            .upgrade-btn { padding: 4px 8px; font-size: 11px; min-width: 50px; }
            #upgrades { max-height: 140px; padding: 4px 8px 8px 8px; gap: 4px; }
            #stats-row { font-size: 10px; padding: 3px 0 0 0; }
            #health-bar-wrap { height: 6px; margin-top: 4px; }
        }
        #upgrades::-webkit-scrollbar { width: 4px; }
        #upgrades::-webkit-scrollbar-track { background: transparent; }
        #upgrades::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.3); border-radius: 10px; }
        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #message-overlay .msg {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ffd700;
            font-size: 32px;
            font-weight: 800;
            padding: 20px 40px;
            border-radius: 20px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            text-align: center;
            display: none;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            pointer-events: auto;
            animation: pulseGlow 1.2s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%,100% { box-shadow: 0 0 20px rgba(255,215,0,0.1); }
            50% { box-shadow: 0 0 50px rgba(255,215,0,0.25); }
        }
        #message-overlay .msg.show { display: block; }
        #message-overlay .msg small {
            display: block;
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <div id="title">🪵 <span data-i18n="title">Лесоруб</span></div>
            <div id="wood-display">
                <span id="wood-icon">🪓</span>
                <span id="wood-count">0</span>
            </div>
        </div>
        <div id="tree-wrapper">
            <canvas id="tree-canvas"></canvas>
            <div id="health-bar-wrap">
                <div id="health-bar" style="width:100%"></div>
            </div>
            <div id="stats-row">
                <span>🌲 <span class="val" id="trees-chopped">0</span></span>
                <span>⚡ <span class="val" id="click-power">1</span></span>
                <span>⏳ <span class="val" id="auto-speed">0</span>/s</span>
            </div>
        </div>
        <div id="upgrades"></div>
        <div id="message-overlay">
            <div class="msg" id="popup-msg">
                <span id="popup-text">🌳 Дерево срублено!</span>
                <small id="popup-sub">Нажмите, чтобы продолжить</small>
            </div>
        </div>
    </div>

    <!-- VK Bridge -->
    <script src="https://vk.com/js/api/xd_connection.js?2"></script>
    <script>
        // =============================================================
        // 1. ПЕРЕВОДЫ (те же, что в Яндекс-версии)
        // =============================================================
        const TRANSLATIONS = {
            ru: {
                title: 'Лесоруб',
                wood: 'Древесина',
                tree: 'Дерево',
                chopped: 'Срублено',
                clickPower: 'Сила удара',
                autoSpeed: 'Авто',
                upgrade1_name: 'Острый топор',
                upgrade1_desc: '+1 за удар',
                upgrade2_name: 'Тяжёлый топор',
                upgrade2_desc: '+2 за удар',
                upgrade3_name: 'Бензопила',
                upgrade3_desc: '+5 за удар',
                upgrade4_name: 'Автолесоруб',
                upgrade4_desc: '+1/сек',
                upgrade5_name: 'Лесной дух',
                upgrade5_desc: '+2/сек',
                upgrade6_name: 'Удобрение',
                upgrade6_desc: 'дерево растёт быстрее',
                popup_title: '🌳 Дерево срублено!',
                popup_sub: 'Нажмите, чтобы продолжить',
                buy: 'Купить',
                cost: 'Цена'
            },
            en: {
                title: 'Lumberjack',
                wood: 'Wood',
                tree: 'Tree',
                chopped: 'Chopped',
                clickPower: 'Power',
                autoSpeed: 'Auto',
                upgrade1_name: 'Sharp Axe',
                upgrade1_desc: '+1 per hit',
                upgrade2_name: 'Heavy Axe',
                upgrade2_desc: '+2 per hit',
                upgrade3_name: 'Chainsaw',
                upgrade3_desc: '+5 per hit',
                upgrade4_name: 'Auto Lumberjack',
                upgrade4_desc: '+1/sec',
                upgrade5_name: 'Forest Spirit',
                upgrade5_desc: '+2/sec',
                upgrade6_name: 'Fertilizer',
                upgrade6_desc: 'tree grows faster',
                popup_title: '🌳 Tree Chopped!',
                popup_sub: 'Tap to continue',
                buy: 'Buy',
                cost: 'Cost'
            },
            tr: {
                title: 'Oduncu',
                wood: 'Odun',
                tree: 'Ağaç',
                chopped: 'Kesilen',
                clickPower: 'Güç',
                autoSpeed: 'Oto',
                upgrade1_name: 'Keskin Balta',
                upgrade1_desc: '+1 vuruş',
                upgrade2_name: 'Ağır Balta',
                upgrade2_desc: '+2 vuruş',
                upgrade3_name: 'Testere',
                upgrade3_desc: '+5 vuruş',
                upgrade4_name: 'Oto Oduncu',
                upgrade4_desc: '+1/sn',
                upgrade5_name: 'Orman Ruhu',
                upgrade5_desc: '+2/sn',
                upgrade6_name: 'Gübre',
                upgrade6_desc: 'ağaç hızlı büyür',
                popup_title: '🌳 Ağaç Kesildi!',
                popup_sub: 'Devam etmek için tıkla',
                buy: 'Satın Al',
                cost: 'Fiyat'
            }
        };

        // =============================================================
        // 2. ИНИЦИАЛИЗАЦИЯ VK BRIDGE + ОПРЕДЕЛЕНИЕ ЯЗЫКА
        // =============================================================
        let currentLang = 'ru';
        let t = TRANSLATIONS.ru;

        function initVK() {
            return new Promise((resolve) => {
                if (typeof VK !== 'undefined' && VK && VK.init) {
                    VK.init({
                        apiId: 0, // не требуется для Mini Apps
                        onlyWidgets: true
                    });
                    // Пытаемся получить язык через VK.WebApp.getLang (если доступно)
                    if (VK.WebApp && typeof VK.WebApp.getLang === 'function') {
                        VK.WebApp.getLang(function(lang) {
                            if (lang && TRANSLATIONS[lang]) {
                                currentLang = lang;
                                t = TRANSLATIONS[lang];
                            } else {
                                t = TRANSLATIONS.ru;
                            }
                            console.log('VK language:', currentLang);
                            applyTranslations();
                            resolve();
                        });
                    } else {
                        // fallback: пробуем через параметры запуска
                        const urlParams = new URLSearchParams(window.location.search);
                        const vkLang = urlParams.get('vk_lang') || urlParams.get('lang');
                        if (vkLang && TRANSLATIONS[vkLang]) {
                            currentLang = vkLang;
                            t = TRANSLATIONS[vkLang];
                        } else {
                            t = TRANSLATIONS.ru;
                        }
                        applyTranslations();
                        resolve();
                    }
                } else {
                    // VK Bridge не загружен – fallback
                    t = TRANSLATIONS.ru;
                    applyTranslations();
                    resolve();
                }
            });
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (t[key] !== undefined) el.textContent = t[key];
            });
            renderUpgrades();
        }

        // =============================================================
        // 3. ИГРОВАЯ ЛОГИКА (АБСОЛЮТНО ТА ЖЕ, ЧТО В YANDEX-ВЕРСИИ)
        // =============================================================
        const canvas = document.getElementById('tree-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const wrapper = document.getElementById('tree-wrapper');
            const size = Math.min(wrapper.clientWidth, wrapper.clientHeight, 400);
            const dpr = 1;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            ctx.scale(dpr, dpr);
            canvas._w = size;
            canvas._h = size;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            drawTree();
        });

        const state = {
            wood: 0,
            woodPerClick: 1,
            autoPerSecond: 0,
            treesChopped: 0,
            treeHealth: 100,
            treeMaxHealth: 100,
            treeAlive: true,
            treeRegrowTimer: 0,
            treeRegrowTotal: 60,
            shakeX: 0,
            shakeY: 0,
            shakeFrames: 0,
            particles: [],
            woodPop: 0,
        };

        const UPGRADE_DEFS = [
            { id: 'axe1', cost: 10, woodPerClickBonus: 1, autoBonus: 0, bought: false, emoji: '🪓' },
            { id: 'axe2', cost: 30, woodPerClickBonus: 2, autoBonus: 0, bought: false, emoji: '🔨' },
            { id: 'axe3', cost: 80, woodPerClickBonus: 5, autoBonus: 0, bought: false, emoji: '⛓️' },
            { id: 'auto1', cost: 50, woodPerClickBonus: 0, autoBonus: 1, bought: false, emoji: '🤖' },
            { id: 'auto2', cost: 120, woodPerClickBonus: 0, autoBonus: 2, bought: false, emoji: '🧙' },
            { id: 'fertilizer', cost: 40, woodPerClickBonus: 0, autoBonus: 0, bought: false, emoji: '🌱', isFertilizer: true },
        ];

        const woodCountEl = document.getElementById('wood-count');
        const healthBarEl = document.getElementById('health-bar');
        const treesChoppedEl = document.getElementById('trees-chopped');
        const clickPowerEl = document.getElementById('click-power');
        const autoSpeedEl = document.getElementById('auto-speed');
        const upgradesContainer = document.getElementById('upgrades');
        const popupMsg = document.getElementById('popup-msg');
        const popupText = document.getElementById('popup-text');
        const popupSub = document.getElementById('popup-sub');

        // ---- все функции: drawTree, spawnParticles, updateParticles, chopTree, regrowTree, etc. ----
        // (копируем их из первого файла, они идентичны)

        function drawTree() {
            const w = canvas._w || 300;
            const h = canvas._h || 300;
            ctx.clearRect(0, 0, w, h);

            const grad = ctx.createRadialGradient(w / 2, h * 0.85, 10, w / 2, h * 0.85, w * 0.8);
            grad.addColorStop(0, '#1e4a1e');
            grad.addColorStop(1, '#0d260d');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = '#1a3a1a';
            ctx.fillRect(0, h * 0.88, w, h * 0.12);

            for (let i = 0; i < 12; i++) {
                const x = (i / 12) * w + Math.sin(i * 2.3) * 12;
                const y = h * 0.88 + Math.sin(i * 1.7) * 4;
                ctx.fillStyle = i % 2 === 0 ? '#2a5a2a' : '#1e4a1e';
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x - 4, y - 12 - Math.sin(i) * 4);
                ctx.lineTo(x + 4, y - 12 + Math.cos(i) * 4);
                ctx.fill();
            }

            const cx = w / 2 + state.shakeX;
            const cy = h * 0.52 + state.shakeY;
            const trunkW = w * 0.12;
            const trunkH = h * 0.28;
            const canopyR = w * 0.30;

            const trunkX = cx - trunkW / 2;
            const trunkY = cy + h * 0.08;

            const trGrad = ctx.createLinearGradient(trunkX, 0, trunkX + trunkW, 0);
            trGrad.addColorStop(0, '#5a3a1a');
            trGrad.addColorStop(0.4, '#7a5a2a');
            trGrad.addColorStop(0.7, '#6a4a1a');
            trGrad.addColorStop(1, '#4a2a0a');
            ctx.fillStyle = trGrad;
            ctx.beginPath();
            ctx.roundRect(trunkX, trunkY, trunkW, trunkH, 4);
            ctx.fill();

            ctx.strokeStyle = 'rgba(40,20,0,0.3)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < 5; i++) {
                const yy = trunkY + 6 + i * (trunkH / 6);
                ctx.beginPath();
                ctx.moveTo(trunkX + 2, yy + Math.sin(i * 1.2) * 3);
                ctx.lineTo(trunkX + trunkW - 2, yy + Math.cos(i * 0.9) * 3);
                ctx.stroke();
            }

            ctx.strokeStyle = '#4a2a0a';
            ctx.lineWidth = 5;
            const branches = [
                [-0.35, -0.15, 0.5, -0.3],
                [0.35, -0.15, -0.5, -0.3],
                [-0.25, -0.05, 0.3, -0.15],
                [0.25, -0.05, -0.3, -0.15],
            ];
            branches.forEach(b => {
                const bx = cx + b[0] * trunkW;
                const by = trunkY + trunkH * 0.3 + b[1] * trunkH;
                const ex = cx + b[2] * canopyR * 1.1;
                const ey = trunkY + trunkH * 0.1 + b[3] * trunkH;
                ctx.beginPath();
                ctx.moveTo(bx, by);
                ctx.lineTo(ex, ey);
                ctx.stroke();
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo((bx + ex) / 2, (by + ey) / 2);
                ctx.lineTo((bx + ex) / 2 + b[2] * 0.3 * canopyR, (by + ey) / 2 - 10);
                ctx.stroke();
                ctx.lineWidth = 5;
            });

            const healthRatio = state.treeAlive ? state.treeHealth / state.treeMaxHealth : 0;
            const alpha = state.treeAlive ? 1 : Math.max(0, healthRatio * 1.2);

            const leafColors = ['#2d7a2d', '#3a8a3a', '#1e6a1e', '#4a9a3a', '#2a6a2a'];
            const leafPositions = [
                [0, -0.25, 1.0],
                [-0.35, -0.05, 0.75],
                [0.35, -0.05, 0.75],
                [-0.2, 0.15, 0.6],
                [0.2, 0.15, 0.6],
                [-0.45, -0.25, 0.5],
                [0.45, -0.25, 0.5],
                [0, 0.0, 0.85],
            ];

            leafPositions.forEach((lp, idx) => {
                const lx = cx + lp[0] * canopyR * 1.0;
                const ly = trunkY + trunkH * 0.35 + lp[1] * canopyR * 1.1;
                const r = lp[2] * canopyR * 0.45;
                let col = leafColors[idx % leafColors.length];
                if (!state.treeAlive) {
                    const dark = Math.floor(50 + (1 - healthRatio) * 80);
                    col = `rgb(${dark+30}, ${dark+10}, ${dark-20})`;
                } else {
                    const bright = 30 + Math.floor(healthRatio * 40);
                    col = `rgb(${20+bright}, ${60+bright*1.2}, ${20+bright*0.6})`;
                }
                ctx.globalAlpha = alpha;
                ctx.fillStyle = col;
                ctx.beginPath();
                ctx.arc(lx, ly, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,200,0.05)';
                ctx.beginPath();
                ctx.arc(lx - r * 0.2, ly - r * 0.3, r * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            if (!state.treeAlive) {
                ctx.fillStyle = '#3a2a1a';
                ctx.beginPath();
                ctx.arc(cx, trunkY + trunkH * 0.9, trunkW * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#4a3a2a';
                ctx.beginPath();
                ctx.arc(cx - 2, trunkY + trunkH * 0.88, trunkW * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(60,40,20,0.3)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(cx, trunkY + trunkH * 0.9, trunkW * 0.2 + i * trunkW * 0.12, 0, Math.PI * 2);
                    ctx.stroke();
                }
                if (state.treeRegrowTimer > 0) {
                    const prog = state.treeRegrowTimer / state.treeRegrowTotal;
                    ctx.fillStyle = `rgba(50,180,50,${0.2 + prog * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(cx, trunkY + trunkH * 0.9, trunkW * 0.5 * prog, 0, Math.PI * 2);
                    ctx.fill();
                    if (prog > 0.3) {
                        ctx.fillStyle = '#4a8a3a';
                        const sh = 6 + prog * 18;
                        ctx.fillRect(cx - 2, trunkY + trunkH * 0.9 - sh, 4, sh);
                        ctx.fillStyle = '#3a7a2a';
                        ctx.beginPath();
                        ctx.arc(cx, trunkY + trunkH * 0.9 - sh - 4, 6 + prog * 8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            state.particles.forEach((p) => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            if (state.woodPop > 0) {
                ctx.fillStyle = `rgba(255,215,0,${Math.min(1, state.woodPop / 20)})`;
                ctx.font = `bold ${20 + state.woodPop * 0.5}px Arial`;
                ctx.textAlign = 'center';
                const popY = cy - canopyR * 0.6 - state.woodPop * 0.8;
                ctx.fillText(`+${state.woodPop}`, cx, popY);
            }
        }

        function spawnParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 4;
                state.particles.push({
                    x: x + (Math.random() - 0.5) * 10,
                    y: y + (Math.random() - 0.5) * 10,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    life: 0.6 + Math.random() * 0.4,
                    decay: 0.008 + Math.random() * 0.015,
                    size: 3 + Math.random() * 6,
                    color: color || `hsl(${30 + Math.random() * 30}, 70%, ${40 + Math.random() * 30}%)`,
                });
            }
        }

        function updateParticles() {
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.life -= p.decay;
                if (p.life <= 0) {
                    state.particles.splice(i, 1);
                }
            }
        }

        function chopTree() {
            if (!state.treeAlive) return;
            const damage = state.woodPerClick;
            state.treeHealth -= damage;
            state.wood += damage;
            state.woodPop = damage;

            state.shakeX = (Math.random() - 0.5) * 14;
            state.shakeY = (Math.random() - 0.5) * 10;
            state.shakeFrames = 6;

            const cx = canvas._w / 2;
            const cy = canvas._h * 0.52;
            spawnParticles(cx + (Math.random() - 0.5) * 60, cy - 20 + (Math.random() - 0.5) * 60, 8 + Math.random() * 6,
                `hsl(${30 + Math.random()*20}, 80%, ${30 + Math.random()*40}%)`);
            spawnParticles(cx + (Math.random() - 0.5) * 80, cy + 20 + (Math.random() - 0.5) * 40, 4,
                `hsl(40, 90%, ${50 + Math.random()*30}%)`);

            if (state.treeHealth <= 0) {
                state.treeAlive = false;
                state.treesChopped++;
                state.wood += state.woodPerClick * 2;
                state.woodPop = state.woodPerClick * 2;
                spawnParticles(cx, cy, 30, `hsl(30, 80%, ${40 + Math.random()*30}%)`);
                spawnParticles(cx - 30, cy - 20, 15, `hsl(120, 60%, ${30 + Math.random()*30}%)`);
                showPopup(t.popup_title, t.popup_sub);
                const fertilizer = UPGRADE_DEFS.find(u => u.id === 'fertilizer' && u.bought);
                state.treeRegrowTotal = fertilizer ? 40 : 80;
                state.treeRegrowTimer = state.treeRegrowTotal;
            }
            updateUI();
            drawTree();
        }

        function regrowTree() {
            if (state.treeAlive) return;
            state.treeRegrowTimer--;
            if (state.treeRegrowTimer <= 0) {
                state.treeAlive = true;
                state.treeHealth = state.treeMaxHealth;
                state.treeRegrowTimer = 0;
                hidePopup();
                const cx = canvas._w / 2;
                const cy = canvas._h * 0.52;
                spawnParticles(cx, cy + 40, 20, `hsl(120, 70%, ${40 + Math.random()*30}%)`);
                updateUI();
                drawTree();
            }
        }

        let popupVisible = false;

        function showPopup(text, sub) {
            popupText.textContent = text;
            popupSub.textContent = sub || '';
            popupMsg.classList.add('show');
            popupVisible = true;
        }

        function hidePopup() {
            popupMsg.classList.remove('show');
            popupVisible = false;
        }

        popupMsg.addEventListener('click', () => {
            if (popupVisible) hidePopup();
        });

        let autoCounter = 0;

        function autoTick() {
            if (state.autoPerSecond > 0 && state.treeAlive) {
                autoCounter += state.autoPerSecond;
                while (autoCounter >= 1) {
                    chopTree();
                    autoCounter--;
                }
            }
        }

        function updateUI() {
            woodCountEl.textContent = Math.floor(state.wood);
            healthBarEl.style.width = state.treeAlive ?
                `${Math.max(0, (state.treeHealth / state.treeMaxHealth) * 100)}%` :
                '0%';
            treesChoppedEl.textContent = state.treesChopped;
            clickPowerEl.textContent = state.woodPerClick;
            autoSpeedEl.textContent = state.autoPerSecond;
            if (state.woodPop > 0) {
                woodCountEl.classList.add('pop');
                setTimeout(() => woodCountEl.classList.remove('pop'), 120);
                state.woodPop = Math.max(0, state.woodPop - 0.5);
            }
            renderUpgrades();
        }

        function renderUpgrades() {
            upgradesContainer.innerHTML = '';
            UPGRADE_DEFS.forEach((def, idx) => {
                const btn = document.createElement('div');
                btn.className = 'upgrade-btn';
                if (def.bought) btn.classList.add('bought');

                const canAfford = state.wood >= def.cost && !def.bought;
                if (!canAfford && !def.bought) btn.classList.add('disabled');

                const nameKey = `upgrade${idx+1}_name`;
                const descKey = `upgrade${idx+1}_desc`;
                const name = t[nameKey] || def.id;
                const desc = t[descKey] || '';

                btn.innerHTML = `
                    <span class="emoji">${def.emoji}</span>
                    <span class="name">${name}</span>
                    <span class="desc">${desc}</span>
                    <span class="cost">${def.bought ? '✅' : '🪵 ' + def.cost}</span>
                    ${def.bought ? '<span class="owned">✔</span>' : ''}
                `;

                if (!def.bought) {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        buyUpgrade(def);
                    });
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        buyUpgrade(def);
                    });
                }
                upgradesContainer.appendChild(btn);
            });
        }

        function buyUpgrade(def) {
            if (def.bought) return;
            if (state.wood < def.cost) return;
            state.wood -= def.cost;
            def.bought = true;
            if (def.woodPerClickBonus > 0) state.woodPerClick += def.woodPerClickBonus;
            if (def.autoBonus > 0) state.autoPerSecond += def.autoBonus;
            const cx = canvas._w / 2;
            const cy = canvas._h / 2;
            spawnParticles(cx, cy, 20, `hsl(50, 100%, 60%)`);
            updateUI();
            drawTree();
        }

        canvas.addEventListener('click', (e) => {
            if (popupVisible) { hidePopup(); return; }
            if (state.treeAlive) chopTree();
            else spawnParticles(e.offsetX, e.offsetY, 5, '#8a6a3a');
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (!touch) return;
            const rect = canvas.getBoundingClientRect();
            const x = (touch.clientX - rect.left) / rect.width * canvas._w;
            const y = (touch.clientY - rect.top) / rect.height * canvas._h;
            if (popupVisible) { hidePopup(); return; }
            if (state.treeAlive) chopTree();
            else spawnParticles(x, y, 5, '#8a6a3a');
        }, { passive: false });

        function gameLoop() {
            if (!state.treeAlive && state.treeRegrowTimer > 0) regrowTree();
            autoTick();
            if (state.shakeFrames > 0) {
                state.shakeFrames--;
                state.shakeX *= 0.85;
                state.shakeY *= 0.85;
            } else {
                state.shakeX = 0;
                state.shakeY = 0;
            }
            updateParticles();
            updateUI();
            drawTree();
            requestAnimationFrame(gameLoop);
        }

        // =============================================================
        // 4. ЗАПУСК
        // =============================================================
        initVK().then(() => {
            state.treeHealth = state.treeMaxHealth;
            state.treeAlive = true;
            updateUI();
            drawTree();
            gameLoop();
        }).catch(() => {
            t = TRANSLATIONS.ru;
            applyTranslations();
            state.treeHealth = state.treeMaxHealth;
            state.treeAlive = true;
            updateUI();
            drawTree();
            gameLoop();
        });

        // roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }
    </script>
</body>
